<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Sagra del CEO</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #9b2d5a;
  --accent-light: #c2406f;
  --accent-dark: #6b1a3a;
  --yellow: #f0c050;
  --red: #e04040;
  --bg: #1a0d12;
  --bg2: #261018;
  --bg3: #331520;
  --border: #4a2030;
  --text: #f5e8ec;
  --text2: #c49aaa;
  --text3: #7a4458;
  --white: #ffffff;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--bg2); border-bottom: 2px solid var(--accent-dark); padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
.header-icon { font-size: 2rem; line-height: 1; }
.header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.9rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; color: var(--white); line-height: 1; }
.header-sub { font-size: 12px; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; margin-top: 2px; }
.header-badge { margin-left: auto; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--accent-light); background: var(--bg3); border: 1px solid var(--accent-dark); border-radius: 20px; padding: 4px 12px; white-space: nowrap; }
.nav { background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 0 1rem; gap: 2px; }
.nav-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 12px 18px; border: none; background: none; color: var(--text3); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: color .15s; }
.nav-btn:hover { color: var(--text2); }
.nav-btn.active { color: var(--accent-light); border-bottom-color: var(--accent-light); }
.main { padding: 1.25rem; max-width: 900px; margin: 0 auto; }
.section { display: none; } .section.active { display: block; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: .75rem; }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--accent-light); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
.grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media(max-width:640px){ .grid3,.grid2 { grid-template-columns: 1fr; } }
input[type=text], input[type=password], input[type=datetime-local], select { width: 100%; padding: 7px 11px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); color: var(--text); font-size: 14px; font-family: 'Barlow', sans-serif; outline: none; transition: border-color .15s; }
input[type=text]:focus, input[type=password]:focus, input[type=datetime-local]:focus, select:focus { border-color: var(--accent-light); }
select option { background: var(--bg2); }
input[type=datetime-local]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
.btn { padding: 8px 18px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); color: var(--text); cursor: pointer; font-size: 13px; font-family: 'Barlow', sans-serif; font-weight: 500; transition: background .15s, border-color .15s; }
.btn:hover { background: var(--bg2); border-color: var(--accent-light); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn-accent:hover { background: var(--accent-light); border-color: var(--accent-light); }
.match-block { padding: 12px 0; border-bottom: 1px solid var(--border); }
.match-block:last-child { border-bottom: none; }
.match-datetime { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.match-datetime input[type=datetime-local] { font-size: 12px; padding: 5px 8px; color: var(--text2); }
.dt-display { font-size: 11px; color: var(--accent-light); font-style: italic; white-space: nowrap; }
.match-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 8px; }
.team-name { font-weight: 600; font-size: 14px; color: var(--text); }
.team-name.right { text-align: right; }
.score-display { display: flex; align-items: center; gap: 8px; justify-content: center; }
.score-box { min-width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; color: var(--white); background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; }
.score-sep { font-size: 18px; color: var(--text3); font-weight: 700; }
.cards-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.cards-info { font-size: 12px; color: var(--text2); }
.winner-label { text-align: center; font-size: 12px; color: var(--text2); margin-top: 4px; }
.winner-label strong { color: var(--accent-light); }
.player-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.player-row input { flex: 1; }
.del-btn { cursor: pointer; color: var(--red); font-size: 20px; line-height: 1; padding: 0 6px; flex-shrink: 0; background: none; border: none; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
.tr-gold td { background: rgba(155,45,90,.15); }
.tr-silver td { background: rgba(255,255,255,.03); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; }
.badge-qf { background: rgba(155,45,90,.25); color: var(--accent-light); border: 1px solid var(--accent-dark); }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
.modal-bg.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; color: var(--accent-light); margin-bottom: 1rem; }
.ev-panel-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.ev-add-row { display: flex; gap: 6px; margin-bottom: 8px; }
.ev-add-row select { flex: 1; font-size: 12px; padding: 6px 8px; }
.ev-add-row .btn { padding: 6px 12px; font-size: 12px; white-space: nowrap; }
.ev-list { min-height: 32px; margin-bottom: 4px; }
.ev-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.ev-item:last-child { border-bottom: none; }
.ev-empty { font-size: 12px; color: var(--text3); padding: 4px 0; }
.auth-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(10, 6, 8, 0.92); padding: 1rem; }
.auth-card { width: 100%; max-width: 420px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.4rem; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
.auth-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .4rem; }
.auth-sub { color: var(--text2); font-size: 14px; margin-bottom: 1rem; }
.auth-error { color: #ff9c9c; font-size: 13px; min-height: 18px; margin-top: .5rem; }
.app-hidden { display: none; }
.info-banner { background: rgba(64, 120, 224, .12); border: 1px solid rgba(64, 120, 224, .35); color: #cfe0ff; border-radius: 8px; padding: .8rem 1rem; font-size: 13px; margin-bottom: .9rem; }
.status-row { display:flex; align-items:center; justify-content:space-between; gap:.75rem; padding: .5rem 1rem; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); }
.status-pill { display:inline-flex; align-items:center; gap:6px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,.02); }
.status-dot { width:8px; height:8px; border-radius:50%; background:#e0b34a; }
.status-dot.live { background:#70c97e; }
</style>
</head>
<body>
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-title">Accesso Admin</div>
    <div class="auth-sub">Inserisci la password per modificare risultati e classifiche.</div>
    <div class="info-banner">Inserisci la password per accedere.</div>
    <input type="password" id="admin-password" placeholder="Password" autofocus onkeydown="if(event.key==='Enter') checkPassword()">
    <div style="display:flex;gap:.6rem; margin-top: .8rem;">
      <button class="btn btn-accent" onclick="checkPassword()">Entra</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<div id="app-shell" class="app-hidden">
  <div class="header">
    <div class="header-icon">⚽</div>
    <div>
      <div class="header-title">Torneo Sagra del CEO</div>
      <div class="header-sub">Pannello di gestione</div>
    </div>
    <div class="header-badge">🔧 Admin</div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('squadre',this)">Squadre & Rose</button>
    <button class="nav-btn" onclick="showTab('gironi',this)">Gironi</button>
    <button class="nav-btn" onclick="showTab('ko',this)">Eliminazione Diretta</button>
    <button class="nav-btn" onclick="showTab('classifiche',this)">Classifiche</button>
    <button class="nav-btn" onclick="showTab('marcatori',this)">Marcatori & Cartellini</button>
    <button class="nav-btn" onclick="showTab('banco',this)">🍺 Coppa Banco</button>
  </nav>
  <div class="status-row"><span class="status-pill"><span id="sync-dot" class="status-dot"></span><span id="sync-label">In attesa di sincronizzazione</span></span><span>Admin online condiviso</span></div>
  <main class="main">
    <div id="squadre" class="section active"></div>
    <div id="gironi" class="section"></div>
    <div id="ko" class="section"></div>
    <div id="classifiche" class="section"></div>
    <div id="marcatori" class="section"></div>
    <div id="banco" class="section"></div>
  </main>
  <div class="modal-bg" id="modal-bg"><div class="modal" id="modal-inner"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.2.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.2.0/firebase-database-compat.js"></script>
<script>
const GIRONI=['A','B','C'];
const PAIRS=[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
const KO_PHASES=[
  {phase:'QF',label:'Quarti di Finale',n:4,hints:['1°A vs 2°B','1°B vs 2°C','1°C vs 2°A','Wildcard']},
  {phase:'SF',label:'Semifinali',n:2,hints:['Vin. QF1 vs Vin. QF2','Vin. QF3 vs Vin. QF4']},
  {phase:'F3',label:'Finale 3°/4° Posto',n:1,hints:['Perd. SF1 vs Perd. SF2']},
  {phase:'F',label:'Finale',n:1,hints:['Vin. SF1 vs Vin. SF2']}
];
const initState=()=>({
  squadre:{
    A:[{name:'',players:[]},{name:'',players:[]},{name:'',players:[]},{name:'',players:[]}],
    B:[{name:'',players:[]},{name:'',players:[]},{name:'',players:[]},{name:'',players:[]}],
    C:[{name:'',players:[]},{name:'',players:[]},{name:'',players:[]},{name:'',players:[]}]
  },matches:{},koTeams:{},banco:{}
});
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCAanAjLnNDFsq5JJ7gYDv3ycpfrLahiOI",
  authDomain: "torneo-chievo.firebaseapp.com",
  databaseURL: "https://torneo-chievo-default-rtdb.firebaseio.com",
  projectId: "torneo-chievo",
  storageBucket: "torneo-chievo.firebasestorage.app",
  messagingSenderId: "1006116681466",
  appId: "1:1006116681466:web:9080aa5572363be37c3b43"
};
const ADMIN_PASSWORD = 'POLI';
let appReady = false;
let hasLoadedInitialState = false;
const app = firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const stateRef = db.ref('torneo_ceo');
let S=initState();
function cloneState(v){
  // JSON round-trip ensures no undefined/functions; Firebase is fine with this
  const s=JSON.parse(JSON.stringify(v));
  // Ensure squadre arrays are clean
  GIRONI.forEach(g=>{
    if(s.squadre&&s.squadre[g]){
      s.squadre[g]=Array.from({length:4},(_,i)=>{
        const sq=s.squadre[g][i]||{name:'',players:[]};
        return {name:sq.name||'',players:(sq.players||[]).filter(p=>p!==null&&p!==undefined)};
      });
    }
  });
  return s;
}
function getSafeState(v){ return v && typeof v === 'object' ? v : initState(); }
function save(){ if(!appReady) return; stateRef.set(cloneState(S)); }
function showCurrentTab(){ const activeSection = document.querySelector('.section.active'); if(activeSection && renders[activeSection.id]) { renders[activeSection.id](); } else { renderSquadre(); } }
function startFirebaseSync(){
  stateRef.on('value', snap => {
    const data = snap.val();
    S = getSafeState(data);
    if(!hasLoadedInitialState){
      hasLoadedInitialState = true;
      renderSquadre();
    } else {
      showCurrentTab();
    }
    const dot = document.getElementById('sync-dot');
    const label = document.getElementById('sync-label');
    if(dot) dot.classList.add('live');
    if(label) label.textContent = 'Sincronizzato live';
  }, err => {
    const label = document.getElementById('sync-label');
    if(label) label.textContent = 'Errore sincronizzazione';
    console.error(err);
  });
}
function checkPassword(){
  const input = document.getElementById('admin-password');
  const error = document.getElementById('auth-error');
  if(!input) return;
  if((input.value || '').trim() !== ADMIN_PASSWORD){
    if(error) error.textContent = 'Password non corretta';
    input.value = '';
    input.focus();
    return;
  }
  sessionStorage.setItem('torneo_admin_ok', '1');
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('app-shell').classList.remove('app-hidden');
  if(!appReady){ appReady = true; startFirebaseSync(); }
}
window.addEventListener('load', () => {
  if(sessionStorage.getItem('torneo_admin_ok') === '1'){
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('app-shell').classList.remove('app-hidden');
    if(!appReady){ appReady = true; startFirebaseSync(); }
  }
});
const mkey=(phase,idx)=>`${phase}_${idx}`;
const mdata=key=>{
  if(!S.matches[key]) S.matches[key]={evA:[],evB:[],dt:''};
  const m=S.matches[key];
  if(!Array.isArray(m.evA)) m.evA=toArr(m.evA);
  if(!Array.isArray(m.evB)) m.evB=toArr(m.evB);
  return m;
};
const sqName=(g,i)=>(S.squadre[g]&&S.squadre[g][i]&&S.squadre[g][i].name)||`Squadra ${g}${i+1}`;
const sqPlayers=(g,i)=>(S.squadre[g]&&S.squadre[g][i]&&toArr(S.squadre[g][i].players)||[]).filter(p=>p&&p.trim());
const calcScore=m=>({
  goA:(m.evA||[]).filter(e=>e.t==='gol').length,
  goB:(m.evB||[]).filter(e=>e.t==='gol').length,
  giA:(m.evA||[]).filter(e=>e.t==='giallo').length,
  giB:(m.evB||[]).filter(e=>e.t==='giallo').length,
  roA:(m.evA||[]).filter(e=>e.t==='rosso').length,
  roB:(m.evB||[]).filter(e=>e.t==='rosso').length
});
const fmtDt=v=>{if(!v)return'';const d=new Date(v);return d.toLocaleString('it-IT',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});};

function showTab(t,el){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById(t).classList.add('active');
  renders[t]&&renders[t]();
}

function renderSquadre(){
  const el=document.getElementById('squadre');
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;color:var(--text)">Squadre & Rose</div>
    <button class="btn btn-accent" onclick="saveSquadre()">Salva tutto</button>
  </div><div class="grid3" id="sq-grid"></div>`;
  const grid=document.getElementById('sq-grid');
  GIRONI.forEach(g=>{
    const c=document.createElement('div');c.className='card';
    let html=`<div class="card-title">Girone ${g}</div>`;
    toArr(S.squadre[g]).forEach((sq,si)=>{
      html+=`<div style="margin-bottom:14px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Squadra ${si+1}</div>
        <input type="text" id="sqn-${g}-${si}" value="${sq.name}" placeholder="Nome squadra" style="margin-bottom:6px">
        <div id="players-${g}-${si}"></div>
        <button class="btn" style="width:100%;font-size:12px;margin-top:4px" onclick="addPlayer('${g}',${si})">+ Aggiungi giocatore</button>
      </div>`;
    });
    c.innerHTML=html;grid.appendChild(c);
    toArr(S.squadre[g]).forEach((_,si)=>renderPlayers(g,si));
  });
}
function renderPlayers(g,si){
  const cont=document.getElementById(`players-${g}-${si}`);if(!cont)return;
  cont.innerHTML='';
  toArr(S.squadre[g]&&S.squadre[g][si]&&S.squadre[g][si].players).forEach((p,pi)=>{
    const row=document.createElement('div');row.className='player-row';
    row.innerHTML=`<input type="text" value="${p}" placeholder="Nome giocatore" onchange="updatePlayer('${g}',${si},${pi},this.value)"><button class="del-btn" onclick="removePlayer('${g}',${si},${pi})">×</button>`;
    cont.appendChild(row);
  });
}
function addPlayer(g,si){if(!S.squadre[g])S.squadre[g]=[];if(!S.squadre[g][si])S.squadre[g][si]={name:'',players:[]};S.squadre[g][si].players.push('');save();renderSquadre();}
function removePlayer(g,si,pi){if(S.squadre[g]&&S.squadre[g][si])S.squadre[g][si].players.splice(pi,1);save();renderSquadre();}
function updatePlayer(g,si,pi,v){if(S.squadre[g]&&S.squadre[g][si])S.squadre[g][si].players[pi]=v;save();}
function saveSquadre(){
  GIRONI.forEach(g=>toArr(S.squadre[g]).forEach((sq,si)=>{
    const el=document.getElementById(`sqn-${g}-${si}`);
    if(el)sq.name=el.value.trim()||`Squadra ${g}${si+1}`;
  }));
  save();alert('Squadre salvate!');
}

function dtBlock(key){
  const m=mdata(key);const dtVal=m.dt||'';
  return `<div class="match-datetime">
    <span style="font-size:13px">📅</span>
    <input type="datetime-local" value="${dtVal}" style="flex:1;font-size:12px;padding:5px 8px;color:var(--text2)" onchange="setMatchDt('${key}',this.value)">
    ${dtVal?`<span class="dt-display">${fmtDt(dtVal)}</span>`:''}
  </div>`;
}

function renderGironi(){
  const el=document.getElementById('gironi');el.innerHTML='';
  GIRONI.forEach(g=>{
    const c=document.createElement('div');c.className='card';
    let html=`<div class="card-title">Girone ${g}</div>`;
    PAIRS.forEach(([a,b],i)=>{
      const key=mkey(`G${g}`,i);const m=mdata(key);const sc=calcScore(m);
      const ta=sqName(g,a),tb=sqName(g,b);
      html+=`<div class="match-block">
        ${dtBlock(key)}
        <div class="match-row">
          <span class="team-name">${ta}</span>
          <div class="score-display">
            <div class="score-box">${sc.goA}</div>
            <span class="score-sep">–</span>
            <div class="score-box">${sc.goB}</div>
          </div>
          <span class="team-name right">${tb}</span>
        </div>
        <div class="cards-row">
          <span class="cards-info">🟨 ${sc.giA} &nbsp; 🟥 ${sc.roA}</span>
          <button class="btn" style="font-size:12px;padding:5px 14px" onclick="openMatchModal('${key}','${g}',${a},${b},'gironi')">⚽ Registra eventi</button>
          <span class="cards-info">🟨 ${sc.giB} &nbsp; 🟥 ${sc.roB}</span>
        </div>
      </div>`;
    });
    c.innerHTML=html;el.appendChild(c);
  });
}

function renderKO(){
  const el=document.getElementById('ko');el.innerHTML='';
  KO_PHASES.forEach(ph=>{
    const c=document.createElement('div');c.className='card';
    let html=`<div class="card-title">${ph.label}</div>`;
    for(let i=0;i<ph.n;i++){
      const key=mkey(ph.phase,i);const m=mdata(key);const sc=calcScore(m);
      const kt=S.koTeams[key];const parts=ph.hints[i].split(' vs ');
      const ta=kt?.a||parts[0]||'';const tb=kt?.b||parts[1]||'';
      const winner=sc.goA!==sc.goB?`<div class="winner-label">Avanza: <strong>${sc.goA>sc.goB?ta:tb}</strong></div>`:'';
      html+=`<div class="match-block">
        ${dtBlock(key)}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
          <input type="text" value="${ta}" placeholder="${parts[0]}" onchange="setKOTeam('${key}','a',this.value)" style="font-size:13px">
          <input type="text" value="${tb}" placeholder="${parts[1]}" onchange="setKOTeam('${key}','b',this.value)" style="font-size:13px">
        </div>
        <div class="match-row" style="margin-bottom:8px">
          <span class="team-name" style="font-size:13px">${ta||'—'}</span>
          <div class="score-display">
            <div class="score-box">${sc.goA}</div>
            <span class="score-sep">–</span>
            <div class="score-box">${sc.goB}</div>
          </div>
          <span class="team-name right" style="font-size:13px">${tb||'—'}</span>
        </div>
        <div class="cards-row">
          <span class="cards-info">🟨 ${sc.giA} &nbsp; 🟥 ${sc.roA}</span>
          <button class="btn" style="font-size:12px;padding:5px 14px" onclick="openKOModal('${key}')">⚽ Registra eventi</button>
          <span class="cards-info">🟨 ${sc.giB} &nbsp; 🟥 ${sc.roB}</span>
        </div>
        ${winner}
      </div>`;
    }
    c.innerHTML=html;el.appendChild(c);
  });
}
function setMatchDt(key,val){mdata(key).dt=val;save();}
function setKOTeam(key,side,val){if(!S.koTeams[key])S.koTeams[key]={a:'',b:''};S.koTeams[key][side]=val;save();}

let CM=null;
function openMatchModal(key,g,ia,ib,tab){CM={key,ta:sqName(g,ia),tb:sqName(g,ib),pA:sqPlayers(g,ia),pB:sqPlayers(g,ib),tab};showModal();}
function openKOModal(key){const kt=S.koTeams[key];CM={key,ta:kt?.a||'Squadra A',tb:kt?.b||'Squadra B',pA:[],pB:[],tab:'ko'};showModal();}
function showModal(){
  const{ta,tb}=CM;
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-title">${ta} <span style="color:var(--text3);font-weight:400">vs</span> ${tb}</div>
    <div class="grid2">
      <div><div class="ev-panel-title">${ta}</div><div id="evf-A"></div><div id="evl-A" class="ev-list"></div></div>
      <div><div class="ev-panel-title">${tb}</div><div id="evf-B"></div><div id="evl-B" class="ev-list"></div></div>
    </div>
    <div style="text-align:right;margin-top:1rem"><button class="btn btn-accent" onclick="closeModal()">Chiudi</button></div>`;
  renderEvForm('A',CM.pA);renderEvForm('B',CM.pB);renderEvList('A');renderEvList('B');
  document.getElementById('modal-bg').classList.add('open');
}
function renderEvForm(side,players){
  const cont=document.getElementById(`evf-${side}`);
  const hasP=players&&players.length>0;
  let pSel=hasP
    ?`<select id="sel-p-${side}" style="font-size:12px;padding:5px 8px;margin-bottom:6px">${players.map(p=>`<option value="${p}">${p}</option>`).join('')}</select>`
    :`<input type="text" id="inp-p-${side}" placeholder="Nome giocatore" style="font-size:12px;padding:5px 8px;margin-bottom:6px">`;
  cont.innerHTML=`${pSel}<div class="ev-add-row">
    <select id="sel-t-${side}"><option value="gol">⚽ Gol</option><option value="giallo">🟨 Giallo</option><option value="rosso">🟥 Rosso</option></select>
    <button class="btn btn-accent" onclick="addEv('${side}')">+ Aggiungi</button></div>`;
}
function getPlayer(side){const s=document.getElementById(`sel-p-${side}`);const i=document.getElementById(`inp-p-${side}`);return s?s.value:i?i.value.trim():'';}
function addEv(side){
  const player=getPlayer(side);if(!player)return;
  const type=document.getElementById(`sel-t-${side}`).value;
  const m=mdata(CM.key);(side==='A'?m.evA:m.evB).push({p:player,t:type});
  save();renderEvList(side);CM.tab==='gironi'?renderGironi():renderKO();
}
function removeEv(side,idx){
  const m=mdata(CM.key);(side==='A'?m.evA:m.evB).splice(idx,1);
  save();renderEvList(side);CM.tab==='gironi'?renderGironi():renderKO();
}
function renderEvList(side){
  const m=mdata(CM.key);const arr=(side==='A'?m.evA:m.evB)||[];
  const cont=document.getElementById(`evl-${side}`);if(!cont)return;
  if(!arr.length){cont.innerHTML=`<div class="ev-empty">Nessun evento</div>`;return;}
  cont.innerHTML=arr.map((e,i)=>`<div class="ev-item"><span>${e.t==='gol'?'⚽':e.t==='giallo'?'🟨':'🟥'} ${e.p}</span><button class="del-btn" style="font-size:14px" onclick="removeEv('${side}',${i})">×</button></div>`).join('');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');CM=null;}

function getStandings(g){
  const st={};
  toArr(S.squadre[g]).forEach((_,i)=>{const n=sqName(g,i);st[n]={pts:0,pg:0,gs:0,gc:0,gd:0,gi:0,ro:0};});
  PAIRS.forEach(([a,b],i)=>{
    const key=mkey(`G${g}`,i);const m=mdata(key);const sc=calcScore(m);
    const ta=sqName(g,a),tb=sqName(g,b);
    st[ta].pg++;st[tb].pg++;
    st[ta].gs+=sc.goA;st[ta].gc+=sc.goB;st[ta].gd+=sc.goA-sc.goB;
    st[tb].gs+=sc.goB;st[tb].gc+=sc.goA;st[tb].gd+=sc.goB-sc.goA;
    st[ta].gi+=sc.giA;st[ta].ro+=sc.roA;st[tb].gi+=sc.giB;st[tb].ro+=sc.roB;
    if(sc.goA>sc.goB)st[ta].pts+=3;else if(sc.goA<sc.goB)st[tb].pts+=3;else{st[ta].pts+=1;st[tb].pts+=1;}
  });
  return Object.entries(st).sort((a,b)=>b[1].pts-a[1].pts||b[1].gd-a[1].gd||b[1].gs-a[1].gs).map(([n,s])=>({n,...s}));
}
function renderClassifiche(){
  const el=document.getElementById('classifiche');el.innerHTML='';
  GIRONI.forEach(g=>{
    const st=getStandings(g);
    const c=document.createElement('div');c.className='card';
    let h=`<div class="card-title">Girone ${g}</div><table><thead><tr><th>#</th><th>Squadra</th><th>Pts</th><th>PG</th><th>GF</th><th>GS</th><th>±</th><th>🟨</th><th>🟥</th></tr></thead><tbody>`;
    st.forEach((t,i)=>{
      const cls=i===0?'tr-gold':i===1?'tr-silver':'';
      h+=`<tr class="${cls}"><td>${i+1}</td><td>${t.n}${i<2?` <span class="badge badge-qf">QF</span>`:''}</td><td><strong>${t.pts}</strong></td><td>${t.pg}</td><td>${t.gs}</td><td>${t.gc}</td><td>${t.gd>0?'+'+t.gd:t.gd}</td><td>${t.gi}</td><td>${t.ro}</td></tr>`;
    });
    h+=`</tbody></table>`;c.innerHTML=h;el.appendChild(c);
  });
}

function renderMarcatori(){
  const el=document.getElementById('marcatori');el.innerHTML='';
  const players={},teamCards={};
  const allKeys=[...GIRONI.flatMap(g=>PAIRS.map((_,i)=>mkey(`G${g}`,i))),...KO_PHASES.flatMap(ph=>Array.from({length:ph.n},(_,i)=>mkey(ph.phase,i)))];
  allKeys.forEach(key=>{
    const m=S.matches[key];if(!m)return;
    const kt=S.koTeams[key];const parts=key.split('_');const phase=parts[0];const idx=parseInt(parts[1]);
    let ta='',tb='';
    if(phase.startsWith('G')){const g=phase[1];const p=PAIRS[idx];if(p){ta=sqName(g,p[0]);tb=sqName(g,p[1]);}}
    else{ta=kt?.a||'';tb=kt?.b||'';}
    [[m.evA||[],ta],[m.evB||[],tb]].forEach(([evs,team])=>{
      if(team&&!teamCards[team])teamCards[team]={gi:0,ro:0};
      evs.forEach(e=>{
        const pk=`${e.p}|||${team||'?'}`;
        if(!players[pk])players[pk]={name:e.p,team:team||'?',gol:0,gi:0,ro:0};
        if(e.t==='gol')players[pk].gol++;
        if(e.t==='giallo'){players[pk].gi++;if(team)teamCards[team].gi++;}
        if(e.t==='rosso'){players[pk].ro++;if(team)teamCards[team].ro++;}
      });
    });
  });
  const sorted=Object.values(players).sort((a,b)=>b.gol-a.gol||b.gi-a.gi);
  const c1=document.createElement('div');c1.className='card';
  let h1=`<div class="card-title">Classifica Marcatori</div><table><thead><tr><th>#</th><th>Giocatore</th><th>Squadra</th><th>⚽</th><th>🟨</th><th>🟥</th></tr></thead><tbody>`;
  if(!sorted.length)h1+=`<tr><td colspan="6" style="color:var(--text3)">Nessun dato ancora</td></tr>`;
  sorted.forEach((p,i)=>{h1+=`<tr class="${i===0?'tr-gold':''}"><td>${i+1}</td><td><strong>${p.name}</strong></td><td style="color:var(--text2)">${p.team}</td><td>${p.gol}</td><td>${p.gi}</td><td>${p.ro}</td></tr>`;});
  h1+=`</tbody></table>`;c1.innerHTML=h1;el.appendChild(c1);
  const c2=document.createElement('div');c2.className='card';
  const tc=Object.entries(teamCards).sort((a,b)=>(b[1].gi+b[1].ro)-(a[1].gi+a[1].ro));
  let h2=`<div class="card-title">Cartellini per Squadra</div><table><thead><tr><th>Squadra</th><th>🟨 Gialli</th><th>🟥 Rossi</th><th>Totale</th></tr></thead><tbody>`;
  if(!tc.length)h2+=`<tr><td colspan="4" style="color:var(--text3)">Nessun dato ancora</td></tr>`;
  tc.forEach(([n,s])=>{h2+=`<tr><td>${n}</td><td>${s.gi}</td><td>${s.ro}</td><td><strong>${s.gi+s.ro}</strong></td></tr>`;});
  h2+=`</tbody></table>`;c2.innerHTML=h2;el.appendChild(c2);
}

function getAllTeams(){return GIRONI.flatMap(g=>toArr(S.squadre[g]).map((_,i)=>sqName(g,i)));}
function renderBanco(){
  const el=document.getElementById('banco');el.innerHTML='';
  if(!S.banco)S.banco={};
  const teams=getAllTeams();
  teams.forEach(t=>{if(S.banco[t]===undefined)S.banco[t]=0;});
  const sorted=[...teams].sort((a,b)=>(S.banco[b]||0)-(S.banco[a]||0));
  const c=document.createElement('div');c.className='card';
  let html=`<div class="card-title">🍺 Coppa Banco — Classifica Consumazioni</div>
  <table><thead><tr><th style="width:36px">#</th><th>Squadra</th><th style="text-align:center">🍺 Tot.</th><th style="text-align:center;width:200px">Aggiungi</th></tr></thead><tbody>`;
  sorted.forEach((team,i)=>{
    const count=S.banco[team]||0;
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const rowCls=i===0?'tr-gold':i===1?'tr-silver':'';
    html+=`<tr class="${rowCls}">
      <td style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700">${medal}</td>
      <td><strong>${team}</strong></td>
      <td style="text-align:center"><span style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--yellow)">${count}</span></td>
      <td style="text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:5px">
          <button class="btn" style="padding:4px 10px;font-size:18px;line-height:1" onclick="bancoDelta('${team}',-1)">−</button>
          <select id="banco-qty-${i}" style="width:58px;padding:4px;font-size:13px;text-align:center">
            <option value="1">+1</option><option value="2">+2</option><option value="3">+3</option><option value="5">+5</option><option value="10">+10</option>
          </select>
          <button class="btn btn-accent" style="padding:4px 12px;font-size:14px;font-weight:700" onclick="bancoAdd('${team}',${i})">+</button>
        </div>
      </td>
    </tr>`;
  });
  html+=`</tbody></table><div style="margin-top:1rem;text-align:center;font-size:12px;color:var(--text3)">Totale consumazioni torneo: <strong style="color:var(--text2)">${Object.values(S.banco).reduce((a,b)=>a+b,0)}</strong></div>`;
  c.innerHTML=html;el.appendChild(c);
}
function bancoAdd(team,rowIdx){if(!S.banco)S.banco={};const qty=parseInt(document.getElementById(`banco-qty-${rowIdx}`)?.value||'1');S.banco[team]=(S.banco[team]||0)+qty;save();renderBanco();}
function bancoDelta(team,delta){if(!S.banco)S.banco={};S.banco[team]=Math.max(0,(S.banco[team]||0)+delta);save();renderBanco();}

const renders={squadre:renderSquadre,gironi:renderGironi,ko:renderKO,classifiche:renderClassifiche,marcatori:renderMarcatori,banco:renderBanco};
</script>
</body>
</html>
